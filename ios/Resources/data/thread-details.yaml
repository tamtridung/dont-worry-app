    hay không? Sau đó bạn nv tháo bcs ra cho em và vứt đi Nên em có 3 thắc mắc mong
    muốn được giải đáp 1. Trường hợp bcs bị rách thì em có nguy cơ lây nhiễm hiv không?
    2. Tay dính dịch âm đạo mà cầm vào dv thì có nguy cơ lây nhiễm hay không? 3. Trường
    hợp của em có nguy cơ với các bệnh STDs không? Và thời gian bao lâu thì có thể
