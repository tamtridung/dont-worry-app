    tầm 1p. Từ lúc đó rượu ngấm nên em không nhớ rõ nữa, chỉ nhớ mang máng là khi
    rút ra hình như không thấy bcs nghi ngờ bị tuột. Sau đo e đi rửa bằng xà phòng
    luôn. Về nhà em rất lo nhưng do đi công tác nên không biết mua thuốc ở đâu. Phải
    đến hôm 14/7 sau khi về em mới đi khám và uông viên Acriptega đầu tiên sau 60h
    nghi nhiễm. Các anh chị cho em hỏi 1 chút ạ 1/ Thuốc Acriptega sau khi uống thì
    tác dụng phụ sẽ có luôn hay sau 2 tuần mới có, vì em thấy mấy bạn trên dd bảo
    còn tầm 10 ngày cuối bắt đầu mệt mỏi và khó chịu nhất 2/ Khả năng thanh công của
    em là bao nhiêu khi uônga thuốc sau 60h vì bs khám cho em nói sau 60h là quá muộn,
    có khi tỉ lệ chỉ 50% 3/ Nếu chỉ tuột bao khoảng 30s tương ứng với tấm 10 lần nhấp
    thì có chắc chắn bị nhiễm không. Hay ngay cả khi gmd bị HIV thì cũng không dễ
    nhiễm khi tuột bao 30s 4/ Trên diễn đàn đã có ai bị nhiễm HIV do quan hệ với gmd
    bị tuột bao chưa ạ 5/ Thường thì các cơ sở mại dâm có cho gmd đi khám sk hàng
    tháng, và nếu có H sẽ cho nghỉ ngay không ạ. Hay sẽ không khám bao giờ và nếu
    có H cũng vẫn cho hành nghề ạ Em mới uống thuốc đc 5 ngày nhưng thật sự căng thẳng,
    không có tâm trí làm việc nữa. Mong các ac trong diễn đàn hỗ trợ, tư vấn để em
    bớt stress hơn ạ. Em cảm ơn'
