- thread-title: Quan hệ vs GMD, có OS và C.I.A
  thread-id: '85993'
  thread-content: Chào mọi người ạ, cách đây khoảng 3-5 tháng e k nhớ chính xác, e
    có quan hệ với GMD, e có hôn sâu nút lưỡi vs GMD, có oral sex , sau đó có xuất
    tinh vào trong miệng GMD ( e và GMD đều không bị chảy máu chân răng hay loét )
    Trước và sau khi quan hệ thì cả e và GMD đều vệ sinh sạch sẽ, có sử dụng BCS nếu
    QHTD. Thời gian gần đâ e thỉng thoảng có biểu hiện bị rát họng vs sưng hạch nhẹ
    dưới quai hàm, chỉ là sưng nhẹ, k lồi lên, nuốt hơi vướng. E muôn hỏi là e có
    nguy cơ bị nhiễm HIV không ạ, giả sử nếu như bạn GMD có/ hoặc không bị HIV nhưng
    khách trước đó có bị HIV rồi xuất tinh vào miệng GMD sau đó lại QHTD và OS tiếp
    đến em thì có nguy cơ bị lây không ạ, GMD trước và sau khi làm thì đều có vệ sinh,
    súc miệng = kem đánh răng. Mong được BQT và mọi người giải đáp ạ, em rất hoang
    mang và lo lắng, nhất là mỗi khi đọc thông tin về HIV, em cảm ơn mọi người và
    chúc mọi người nhiều sức khoẻ ạ.
  responses:
  - response-content: Không có nguy cơ HIV.
    responser: Tuanmecsedec
