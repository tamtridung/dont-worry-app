    về vấn đề HIV cũng như bệnh xã hội. Thời gian của các bệnh có nguy cơ và thời
    gian như nào ạ. Em cần đi xét nghiệm vào những khoảng thời gian nào ạ Hiện tại
    thì em chưa có dấu hiệu gì ở DV, cách đây 1 ngày thì có vài chấm mụn trên tay
    nhưng giờ đã không có. Bao cao su thì do GMD đưa, em cũng không chắc là có ổn
    không ạ
