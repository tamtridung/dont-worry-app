- thread-title: Tôi không biết xác suất lây nhiễm HIV trong quan hệ tình dục là bao
    nhiêu phần trăm.
  thread-id: '7786'
  thread-content: 'Xác suất lây truyền qua quan hệ tình dục với người nhiễm HIV (không
    sử dụng biện pháp bảo vệ).Có nhiều thông tin cho rằng là 1/1.000 đến 1/100, thực
    ra xác xuất này chỉ được tính trên quần thể. Nhưng với từng cá nhân có hành vi
    tình dục không bảo vệ thì xác suất lây nhiễm HIV luôn là 1 hoặc 0 (tức 100% hoặc
    0 %). Do vậy, cách tự biện minh cho hành vi nguy cơ của mình là 100 lần quan hệ
    mới có thể nhiễm virus là hoàn toàn sai lầm và nguy hại. Khả năng lây nhiễm này
    sẽ tăng gấp nhiều lần, nếu một trong hai người bị mắc các bệnh lây truyền qua
    đường tình dục như: Lậu, giang mai, sùi mào gà, nấm, Herpes.... Nói về xác xuất
    thì Tuanmecsedec muốn chia sẻ thêm : Ai là người cần biết về xác xuất lây nhiễm
    ? Đó là những nhà hoạch định chiến lược phòng chống HIV/AIDS chứ không phải những
    người có nguy cơ. Tại sao ? Vì.... Ai là người cần biết về xác xuất lây nhiễm
    ? Đó là những nhà hoạch định chiến lược phòng chống HIV/AIDS chứ không phải những
    người có nguy cơ. Tại sao ? Vì bản chất của xác xuất là như vậy. Vì vậy,Tuanmecsedec
    khuyên các bạn như thế này,ví dụ : Thả 1 con xúc xắc có 6 mặt xuống sàn thì mỗi
    mặt đều có 1/6 cơ hội được lật lên phía trên. Nếu bạn thả xúc sắc, bạn chỉ có
    2 cơ hội có thể xảy ra : Được và Không được. Với mỗi người có hành vi nguy cơ,
    xác xuất của họ luôn là 50/50.'
  responses: []
