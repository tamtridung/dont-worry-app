    bạn đã xét nghiệm âm tính sau khi uống đủ 28 viên - 28 ngày tư khi tiếp
    xúc với em từ ngày 5. Chuyện k có gì đáng nói khi trong quá trình em
    và bạn em uống pep thì bọn em có oral cho nhau (Trong khoảng từ khi bạn
    gái tiếp xúc với em lần đầu vào ngày 5 đến khi uống hết pep). Em không
    nhớ rõ chính xác các mốc thời gian, khoảng 3 lần và lần cuối bọn
    em oral là ngày em uống hết pep và xn âm tính - Tức ngày 28 sau nguy cơ
    tiếp xúc với GMD của em. Bạn gái em cũng đã làm thêm xét ngiệm agab
    âm tính vào ngày 42 (nguy cơ 1 khi oral cho em vào ngày 5) và nếu xét
    vào lần cuối tiếp xúc (ngày 28 em có kq xn âm tính) là 19 ngày từ nguy
    cơ 2. Em có 1 số câu hỏi như sau: Em và bạn đã an toàn chưa ạ? Cái em
    sợ nhất là trong khoảng tg em và bạn uống pep có oral qua lại thì lúc
    này virus chưa được pep ức chế hoàn toàn thì những lần oral đó có tạo
    ra các nguy cơ mới và bọn em phải tính từ lần tiếp xúc gần nhất không
    ạ? Như trong th bạn gái em là 19 ngày kể từ khi em với bạn tiếp xúc
    gần nhất.'
