- thread-title: Quan hệ với người nhiễm HIV 10 năm (từ 2015)
  thread-id: '85757'
  thread-content: Chào anh chị, Em có quen 1 bạn đồng giới nam, bạn đó nằm dưới (bottom)
    và đã điều trị HIV từ 2015, hiện tại thì em không biết kết quả điều trị, xét nghiệm
    của bạn có tốt không, nhưng em thấy bạn vẫn khỏe như người bình thường, dạo gần
    đây bạn vẫn tăng cân và có da có thịt hơn, bạn cũng có chơi thể thao. Em với bạn
    có cãi nhau 1 thời gian không gặp, thì khoảng cuối tháng 8 (tầm 27, 28/8) em với
    bạn có gặp lại và quan hệ với nhau. Sau đó tầm ngày 3,4/9 em với bạn có quan hệ
    nữa, và cứ mỗi cuối tuần gặp nhau sẽ quan hệ, đến nay chắc đã quan hệ với nhau
    tổng cộng 4-5 ngày cuối tuần, mỗi ngày cuối tuần quan hệ là 2-3 lần/ngày. Tổng
    số lần quan hệ khoảng 15-17 lần từ khi gặp lại và không tính quan hệ bằng miệng.
    Nhưng mỗi lần quan hệ em có đeo bao, xong thì em có đổ nước vào test và không
    rách bao. Có 1 lần em rút ra thì bao tuột, dịch và gel chỗ hậu môn bạn dính vào
    dương vật của em. Có 1 lần em dùng tay làm cho bạn ra dịch dính lên tay nhưng
    em vẫn lấy bao đeo vào (ý em dịch nằm mặt trong bao và tiếp xúc da dương vật em).
    Có 5-6 lần bạn dùng miệng quan hệ, làm cho em ra và mỗi lần đều bị xước do cạ
    vào răng, 1 lần chảy máu ít, còn lại không chảy máu, chỉ rướm đỏ dưới da. Có 1
    lần bạn bị nhiệt miệng chảy máu, em bị nứt môi có chảy máu nhưng có đóng mài,
    em với bạn có hôn sâu. Những ngày cuối tuần bạn qua nhà em ở, ngủ chung ko mặc
    áo, bạn bị mụn lưng và có vết mài máu khô nhiều. Dùng khác bàn chải đánh răng
    nhưng dùng chung tuýp kem đánh răng, và có những sinh hoạt hằng ngày chung với
    nhau em ko nhớ rõ... Anh chị xem qua trường hợp này của em xem có lần nào bị tính
    là nguy cơ không, vì em cứ cho là họ ở lại không rời đi nữa, em cũng tin tưởng
    và không nghĩ gì nhiều... nhưng hôm nay họ lại bỏ đi. Em chỉ muốn biết là có trường
    hợp nào có nguy cơ không để em chuẩn bị tinh thần cho kết quả xấu thôi, mong anh
    chị xem qua và cho em xin nhận xét về tình huống của em. Em quen bạn em cũng chấp
    nhận tình huống xấu nhất xảy ra, nên anh chị cho em xin nhận xét thật em biết
    với anh chị nhé. Em cảm ơn anh chị.
  responses:
  - response-content: Nếu quan hệ trực tiếp có dùng bao cao su thì không sao.Nhưng
      quan hệ bằng miệng thì có nguy cơ các bệnh tình dục khác.
    responser: Tuanmecsedec
  - response-content: bạn đó không bị bệnh nào khác ngoài HIV, vậy là trường hợp của
      em có được xem là an toàn ko có nguy cơ với bệnh nào hết ko anh?
    responser: hungpham2205
