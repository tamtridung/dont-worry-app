    về sau để bóp ngực, trong lúc đó nữ vẫn đang dùng tay kích thích dương vật nam.
    5. Sau đó, nam vén váy và vén quần lót nữ (khó khăn do chật), thấy rõ âm hộ được
    cạo sạch. Nam kích thích âm vật bên ngoài bằng ngón tay, đồng thời liếm tai và
    bóp ngực. Vì khoảng cách hơi hẹp để có thể cánh tay người nam đưa ngón tay vào
    sâu âm đạo nên nam ngả người nữ về sau để cho ngón tay sâu vào âm đạo, móc/ngọ
