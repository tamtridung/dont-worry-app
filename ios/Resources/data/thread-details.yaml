- thread-title: Cho phép em trình bày về vấn đề một số diễn đàn tư vấn hiv hù người
    ta vô đạo đức
  thread-id: '58204'
  thread-content: '- Cho phép em chửi thề tý (mẹ bà nó). Mình thử qua cái diễn đàn
    của BS B, mẹ nó tư vấn cái quái gì cũng có nguy cơ làm cả tuần nay căng thẳng
    chết mồ, rồi bắt gọi vào tổng đại nạp cash để được tư vấn. Mình hỏi là oral sex
    ( không trầy xước gì cả từ 2 phía) có nguy cơ hay không, nó bảo là có tỷ lệ 0.005
    % còn thòng thêm 1 câu là " ai tư vấn không có là không chính xác " . Em hỏi có
    trường hợp nào ghi nhận lại vụ oral sex ở Việt Nam mà bị chưa ? Trả lời tỉnh bơ
    " có một anh được gái mại dâm oral, anh ấy bị xước dương vật và cô ấy bị lở môi
    nên bị lây ". Mình hỏi là bên diễn đàn mình ghi nhận được trường hợp này hay sao
    thì lại trả lời là " nghe nói từ nguồn khác ". - Mẹ bà nghe nói mà phán như thánh,
    thành nguồn cơ sở dữ liệu y khoa à . Nó bảo kêu xét nghiệm combo với viên gan
    B kèm theo cả C, báo giá hết 450K. Mình tìm một số tài liệu thì nói là tỷ lệ lây
    viêm gan C qua đường tình dục là 1/190,000 và phải có điều kiện là có vết cắt
    chảy máu từ hai bên tiếp xúc nhau. Vậy chứng tỏ là nó chơi kiểu thà tư vấn nhầm
    còn hơn bỏ sót, bảo người ta xét nghiệm hết mà không xem xét đến nguy cơ. Tóm
    lại cám ơn anh Tuấn và các anh chị trên diễn đàn rất nhiều, em lấy lại được thăng
    bằng rồi. Nhưng cho phép em chửi " mả cha bọn vô lương tâm, vì đồng tiền mà làm
    hoang mang người khác " . ông bình thành lập 1 diễn dàn tư vấn mục đích thu cước
    phí điện thoại và có 1 phòng khám riêng ở đường Hùng Vương,Q5.nên ổng tư vấn kiểu
    dù dọa để người ta lo lắng gọi điện thoại nên ổng thu được nhiều cước phí,một
    mặc ổng còn kêu réo về phòng khám ổng xét nghiệm,ổng nói xét nghiệm Hòa Hảo thủ
    tục rùm rà. Có những trường hợp dù không có nguy cơ,ổng cũng kêu về phòng khám
    ổng bán thuốc phơi nhiễm và còn nói là phác đồ bậc 2 gì đó tốt hơn bậc 1 với giá
    mấy triệu đồng,ngoài ra diễn đàn ông bình còn tạo ra những chủ đề nào là nói uống
    thuốc phơi nhiễm bậc 1 Mylan M152 bị thất bại,thật ra tôi có hỏi nhiều bác sĩ
    chuyên khoa họ nói không bao giờ có chuyện đó,cái đó là ổng tự tạo chủ đề bịa
    chuyện ra để kêu về phòng khám của ông thôi,mọi người lưu ý coi chừng kiểu tư
    vấn ông bình.'
