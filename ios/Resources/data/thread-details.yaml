  thread-content: Chào mọi người diễn đàn ạ . E có QHTD với bạn gái mới quen . Ban
    đầu e có cạ ngoài AD của bạn gái và cho DV vào trong nhấp khoảng 10s e rút ra
    ( ko có BcS ) khi rút ra e có thấy máu dính trên đầu DV ạ . Rất loãng và ít không
