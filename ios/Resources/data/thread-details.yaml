    đó leo lên người em cho dv vào và nhún. Thật ra vừa cho vào là em đã ra rồi nên
    xìu xuống nhanh. Sau khi nhún được 1 lúc dv e xìu xuống rồi thì bạn rút ra thì
    bao vẫn còn trên dv. Em không để ý rách hay không, nhưng vấn thấy bao trùm đầu,
    và 2/3 dv. 1. Cho em hỏi có nguy cơ bị lây HIV không ạ? 2. Cho em hỏi có nguy
    cơ bị lây các bệnh STD không ạ, tỉ lệ bao nhiêu ạ? Ban đầu em tính đi xn sau 3
    tháng nhưng mà * Hôm qua tối 19:50 24/01/25 em có qua phòng khám đa khoa tân bình.
    Theo tư vấn của bs trên web. - Ở đây chia ra 2 loại: + xét nghiệm test nhanh.
    Vài chục phút tổng các bệnh hiv, std là 3tr. + xét nghiệm mẫu. Mất vài ngày tổng
    các bệnh là 5tr Em lấy gói 5tr :" BS nữ: bs này có vẻ hơi khó chịu với em - Em
    vô phòng khám bs nữ hỏi em, em nghĩ giờ xét nghiệm có ra không? Em bảo theo em
    tìm hiểu thì là không? - Em có hỏi vậy giờ ra tết 1 tháng em xn có được không?
    - BS nữ lại nói, sao phải đợi qua tết, giờ xét nghiệm luôn đi, xong hối em quyết
    định nhanh vì sắp hết giờ làm. Rồi 3 tháng sau xét nghiệm lại. Còn cảm thấy sợ
    thì uống thuốc phơi nhiễm. - Theo bs nữ thì xét nghiệm hiện tại âm tính thì do
    em hiện tại em âm tính. Còn 3 tháng sau cho dù em ko qh hay gì thì cũng ko biết
    em có dương tính hay không phải xn lại. BS nam 1: hơi hơi khó chịu Có 1 bs nam
    nói em là theo bs thì nên xét nghiệm lấy mẫu 5tr luôn. Nếu âm tính thì sau 3 tháng
    không cần thiết phải xn nữa vì kq là chính xác. Còn muốn an tâm thì 3 tháng sau
    quay lại test nhanh là ok. BS nam 2: Anh này là dễ chịu với em nhất Có 1 anh lấy
    mẫu cho em, nói nếu mà qh không os, và có mang bao thì không bị dính đâu, tỉ lệ
    gần như bằng 0. Xét nghiệm để an tâm thôi. Cảm thấy không an tâm thì uống pep
    anh chỉ chỗ mua rẻ. Em có hỏi theo anh thì thấy em có cần uống ko. Anh ấy bảo
    theo anh thấy thì không cần thiết. Ảnh còn đưa visit card cho em. Để khi nào em
    cảm thấy lo lắng thì gọi cho ảnh. Anh ấy nói anh nghĩ là em không bị đâu cứ yên
    tâm về nhà. 3 tháng sau nếu không an tâm thì quay lại test cho yên tâm, giải tỏa
    tâm lý. Em đang bị hoang mang vì không biết nên nghe theo ai. Tại sao lại như
    vậy. Các nguồn kiến thức không giống nhau.'
