- thread-title: Lo lắng khi đi massage không lành mạnh
  thread-id: '84274'
  thread-content: Chào ban quản trị và các anh chị trên diễn đàn. Em xin được hỏi
    về nguy cơ của em khi đi massage không lành mạnh ạ Hôm trước em có uống bia và
    đi massage. Trong suốt quá trình em không quan hệ với nhân viên, không quan hệ
    miệng cho nhau nhưng phát sinh những vấn đề này em lo quá không biết có nguy cơ
    HIV và các bệnh khác không. -Nguy cơ thứ nhất em và cô gái đó có tắm rửa cho nhau
    trong bồn tắm có xả nước, tay bạn nữ có thụt rữa vệ sinh âm đạo của mình và vệ
    sinh cho dương vật của em, em sợ dịch trong âm đạo đó dính vào tay bạn nữ đó sau
    đó tiếp xúc với lỗ sáo dương vật của em khi vệ sinh cho em, cũng như dịch đó hòa
    vào trong nước tiếp xúc với lỗ sáo dương vật của em. - Nguy cơ thứ hai là trong
    quá trình massage bạn gái đó có đổ dầu trên người em và dùng cơ thể trườn khắp
    người em, vú và âm đạo bạn gái đó tiếp xúc trưc tiêp với những nốt mụn nọt em
    vừa nặn lúc trước khi vào massage và vết trầy xướt trên người do gãi. Thời gian
    có nguy cơ này khoản 15p ạ - Nguy cơ thứ ba là bạn nữ ấy có dùng dầu đổ ra tay
    vuốt qua lại âm đạo bạn ấy rồi dùng tay đó bắt đầu kích thích dương vật của em,
    em sợ dịch âm đạo dính vào tay bạn ấy rồi kích thước dương vật của em thì có sao
    không ạ, em cũng không biết tay bạn ấy có vết trầy xướt chảy máu gì không nữa,
    thời gian của nguy cơ này là tầm 10p - Nguy cơ thứ tư trong quá trình bạn ấy massage
    em có dùng tay của mình cho sâu vào âm đạo bạn ấy để kích thích cho bạn ấy, sau
    đó em có cầm chạm và vuốt qua dương vật của em, tay em thì không bị trầy xướt
    nhưng em sợ dịch âm đạo dính trên tay em tiếp xúc với lỗ sáo dương vật ạ, thời
    gian em kích thích cho bạn ấy tầm 10p - Nguy cơ thứ 5 là bạn nữ ấy sau khi tắm
    cho em xong có dùng khăn của phòng massage lau trên người em, khăn có tiếp xúc
    với vết trầy xướt, mụn nhọt trên người em do em gãi ạ Mong anh Tuấn và các anh
    chị tư vấn giúp em với, em lo sợ quá
