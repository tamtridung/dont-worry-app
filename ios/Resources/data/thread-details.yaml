- thread-title: QHTD có sử dụng và OS không sử dụng
  thread-id: '84733'
  thread-content: Em chào BQT và các thành viên trong diễn đàn ạ. Em muón hỏi về nguy
    cơ bản thân, vừa rồi ngày 24/12 em có QH với GMD OS không bao tầm ~1p sau đó lâm
    trận thì ban đầu vừa đưa DV gần sát ÂD không dùng bao và GMD cũng muốn đi trần,
    em không đồng ý và sử dụng BCS trong lúc QH. Đọc và tìm hiểu các bài viết thì
    em xem không có nguy cơ, nhưng muốn xem phản hồi từ các anh chị ạ. - OS không
    bao ~1p - DV có đưa sát và ÂD, chưa thâm nhập ~ 15-20s Với các nguy cơ trên em
    muốn tiến hành xét nghiệm các bệnh xã hội dự kiến ngày 22/1 ( kể từ ngày nguy
    cơ tổng là 29 ngày). em dự định test nhanh bằng các loại que test trước khi chốt
    máy 3 tháng sau. Anh chị xem qua giúp e ạ. 1. lậu, nấm Chlamydia qua 2 tuần (~15
    ngày) không biểu hiện triệu chứng, em đã an tâm được chưa ạ? biểu hiện của nấm
    Chlamydia là như thế nào e không rõ. 2. HIV phương án test nhanh ALere HIV combo
    (29 ngày) 3. Giang mai phương án test Syphilis Rapid test (Fastep) (29 ngày) 4.
    VGB,VGC,HPV dùng phương án tương tự bộ test nhanh Fastep ( 29 ngày). Mong anh
    chị giải đáp giúp em ạ. * Thêm phần thắc mắc là em có hay bị mụn rộp kiểu zona
    ở vị trí khuỷ tay bị đối xứng, cổ tay, phía sau lưng vị trí gần cổ lâu lâu có
    xuất hiện trên miệng vị trí nhân trung. KHông rõ hiện tượng này là như thế nào
    ạ.
  responses:
  - response-content: Yên tâm những kết quả đó,vì không có nguy cơ.
    responser: Tuanmecsedec
