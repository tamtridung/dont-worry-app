name: DontWorryiOS
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.dontworry.ios
    SWIFT_VERSION: 5.10
packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.1.3
targets:
  DontWorryiOS:
    type: application
    platform: iOS
    sources:
      - path: DontWorryiOS
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: Yams
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
  DontWorryIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/DontWorryIOSTests
    dependencies:
      - target: DontWorryiOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
